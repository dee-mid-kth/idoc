<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>iDOC Interactive Documentary Festival</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
}

.header{
  text-align:center;
  font-size:36px;
  font-weight:bold;
  margin:30px 0;
}

.row{
  display:flex;
  overflow-x:auto;
  gap:20px;
  padding:40px;
}

.poster img{
  height:300px;
  border-radius:8px;
  box-shadow:0 10px 30px rgba(0,0,0,0.8);
  transition:transform 0.2s;
}

.poster img:hover{
  transform:scale(1.08);
}
</style>
</head>

<body>

<div class="header">iDOC Interactive Documentary Festival</div>

<div class="row">

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/menu">
    <img src="menu.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/chronicles-of-bo">
    <img src="chronicle.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/spark">
    <img src="spark.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/adrenaline">
    <img src="adrenaline.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/dialing">
    <img src="dialing.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/oldtown">
    <img src="oldtown.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/brew">
    <img src="brew.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/julmarknad">
    <img src="julmarknad.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/gubbstil">
    <img src="gubbstil.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/hazelight">
    <img src="hazelight.png">
  </a>

  <a class="poster" href="https://dee-mid-kth.github.io/idoc/scenkonst">
    <img src="scenkonst.png">
  </a>

</div>

<script>
  // Randomize the order of .poster links inside .row (runs once on load)
  document.addEventListener('DOMContentLoaded', () => {
    const row = document.querySelector('.row');
    if (!row) return;

    // Collect only the poster elements (ignore whitespace/text nodes)
    const posters = Array.from(row.querySelectorAll('.poster'));

    // Fisher–Yates shuffle
    for (let i = posters.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [posters[i], posters[j]] = [posters[j], posters[i]];
    }

    // Re-append in the new order
    posters.forEach(p => row.appendChild(p));

    // Optional: also reshuffle (or reload) every 10 minutes
    // setInterval(() => location.reload(), 600000); // <- uncomment to auto-refresh
    // Or, without reloading, reshuffle in place:
    // setInterval(() => {
    //   for (let i = posters.length - 1; i > 0; i--) {
    //     const j = Math.floor(Math.random() * (i + 1));
    //     [posters[i], posters[j]] = [posters[j], posters[i]];
    //   }
    //   posters.forEach(p => row.appendChild(p));
    // }, 600000);
  });
</script>

</body>
</html>
